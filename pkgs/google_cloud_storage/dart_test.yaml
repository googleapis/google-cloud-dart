platforms: [vm, chrome]

test-randomize-ordering-seed: random
# Keeping concurrency low helps limit load timeouts on chrome tests.
concurrency: 1

tags:
  google-cloud:
  firebase-emulator:
  storage-testbench:
exclude_tags: google-cloud || firebase-emulator || storage-testbench

presets:
  google-cloud:
    include_tags: google-cloud
    # Currently tests that require a configured Google Cloud project are only
    # runnable on the VM because the browser does not have access to
    # application default credentials.
    platforms: [vm]
  firebase-emulator:
    include_tags: firebase-emulator
  storage-testbench:
    include_tags: storage-testbench
